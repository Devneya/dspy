refine:
  name: Refine
  description: ""
  wrapper: 1
  default_threshold: 0.5
  reward_code: |
    def reward_fn(inputs, prediction):
        """
        Reward function for Refine.
        Args:
            inputs: dict passed to the module
            prediction: dspy.Prediction object (access fields with prediction.field_name)
        Returns:
            float, int, or bool (higher is better, >= threshold stops refining)
        """
        # Example: reward shorter answer field
        answer = str(prediction.answer) if hasattr(prediction, 'answer') else str(prediction)
        score = min(1 - len(answer) / 200, 1.0)
        return score

